<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanFuture | Planejamento de Aposentadoria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link rel="stylesheet" href="/frontend/css/style2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span class="logo-text">Finan<span class="highlight">Future</span></span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">
                    <i class="fas fa-home"></i> Início
                </a>
                <a href="pages/simulador.html" class="nav-link">
                    <i class="fas fa-calculator"></i> Simulador
                </a>
                <a href="pages/educacao.html" class="nav-link">
                    <i class="fas fa-graduation-cap"></i> Educação
                </a>
                <a href="pages/dicas.html" class="nav-link">
                    <i class="fas fa-lightbulb"></i> Dicas
                </a>
            </div>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>
    
    <div class="dashboard">
        <div class="welcome-card animate-slide">
            <div class="welcome-content">
                <div class="hero-icon">
                    <i class="fas fa-coins"></i>
                </div>
                <h1 class="hero-title">FinanFuture</h1>
                <p class="hero-subtitle">Planeje hoje, viva amanhã com tranquilidade financeira</p>
                <a href="pages/simulador.html" class="cta-button">
                    <i class="fas fa-rocket"></i> Começar Agora
                    <i class="fas fa-arrow-right"></i>
                </a>
            </div>
        </div>

        <div class="concepts-section">
            <div class="concepts-grid">
                <div class="concept-card concept-start">
                    <div class="concept-amount">
                        <i class="fas fa-coins"></i>
                        <span>R$ 10.000</span>
                    </div>
                    <div class="concept-label">Começo</div>
                </div>
                <div class="concept-arrow">
                    <i class="fas fa-arrow-right"></i>
                    <i class="fas fa-arrow-right"></i>
                    <i class="fas fa-arrow-right"></i>
                </div>
                <div class="concept-card concept-mid">
                    <div class="concept-amount">
                        <i class="fas fa-chart-line"></i>
                        <span>R$ 25.000</span>
                    </div>
                    <div class="concept-label">5 anos</div>
                </div>
                <div class="concept-arrow">
                    <i class="fas fa-arrow-right"></i>
                    <i class="fas fa-arrow-right"></i>
                    <i class="fas fa-arrow-right"></i>
                </div>
                <div class="concept-card concept-end">
                    <div class="concept-amount">
                        <i class="fas fa-chart-line"></i>
                        <span>R$ 62.000</span>
                    </div>
                    <div class="concept-label">10 anos</div>
                </div>
            </div>
            <div class="concept-footer">
                <i class="fas fa-lightbulb"></i>
                <p>Com 6% ao ano, seu dinheiro dobra a cada 12 anos</p>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-number">10K+</div>
                <div class="stat-label">Usuários ativos</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">
                    <i class="fas fa-chart-pie"></i>
                </div>
                <div class="stat-number">R$ 50M+</div>
                <div class="stat-label">Patrimônio planejado</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">
                    <i class="fas fa-star"></i>
                </div>
                <div class="stat-number">98%</div>
                <div class="stat-label">Satisfação</div>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('.menu-toggle')?.addEventListener('click', () => {
            const navLinks = document.querySelector('.nav-links');
            navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
        });
    </script>
    <script src="/frontend/js/index.js"></script>
</body>
</html>
